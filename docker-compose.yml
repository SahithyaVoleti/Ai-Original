version: '3.8'

services:
  # Next.js Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:5000
    restart: always

  # Flask API Server
  backend-api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend/api/resumes:/app/resumes
      - ./backend/api/evidence:/app/evidence
      - ./backend/api/reports:/app/reports
    env_file:
      - ./backend/api/.env
    restart: always

  # Proctoring/AI Worker
  backend-worker:
    build:
      context: ./backend/worker
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./backend/worker/resumes:/app/resumes
      - ./backend/worker/evidence:/app/evidence
    env_file:
      - ./backend/worker/.env
    restart: always
